# Mc-EasyPanel Docker Compose 配置
services:
  mc-easypanel:
    build: .                              # 使用当前目录的 Dockerfile 构建
    container_name: mc-easypanel          # 容器名称
    ports:
      - "3301:3001"                       # 面板 Web 端口
      - "25565:25565"                     # Minecraft 服务器端口
    volumes:
      - ./data:/app/server/data           # 面板数据（实例配置、用户信息等）
      - ./servers:/app/servers            # 服务器文件挂载入口
    command: >
      sh -c "chmod -R 777 /app/server/data && exec dumb-init node server/dist/index.js"
    restart: always                         # 自动重启
    environment:
      - TZ=Asia/Shanghai                  # 时区
      - NODE_ENV=production               # 运行模式
      - PORT=3001                         # 面板监听端口
      - JWT_SECRET=${JWT_SECRET}  # JWT 签名密钥（必填！通过 .env 文件设置，不可使用默认值）
      # 内存限制已移除

